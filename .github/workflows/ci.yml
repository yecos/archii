name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx next lint

      - name: Build
        run: npx next build
        env:
          NODE_ENV: production

      - name: Check TypeScript
        run: npx tsc --noEmit --pretty

  security-audit:
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Check for secrets
        run: |
          if git diff HEAD~1 --name-only 2>/dev/null | xargs grep -l -E '(ghp_|AIza|sk-|xoxb-|PK[0-9])' 2>/dev/null; then
            echo "::warning::Posibles secrets detectados en el diff"
          fi
        continue-on-error: true
