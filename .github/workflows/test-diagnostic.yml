# ArchiFlow — Test Diagnostic System
# Runs 530 tests on every push + daily at 6:00 AM Colombia time
# Uploads test-report.html as downloadable artifact (90 days retention)

name: Test Diagnostic

on:
  push:
    branches: [main]
  schedule:
    # Every day at 6:00 AM America/Bogota = 11:00 UTC
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions tab

jobs:
  diagnostic:
    name: Run Tests & Generate Report
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run diagnostic tests
        run: bun run test:diagnostic

      - name: Generate summary for GitHub
        if: always()
        run: |
          echo "## Test Diagnostic Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f test-reports/diagnostic-summary.json ]; then
            TOTAL=$(cat test-reports/diagnostic-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin)['summary']; print(d.get('totalTests',0))")
            PASSED=$(cat test-reports/diagnostic-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin)['summary']; print(d.get('passed',0))")
            FAILED=$(cat test-reports/diagnostic-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin)['summary']; print(d.get('failed',0))")
            RATE=$(cat test-reports/diagnostic-summary.json | python3 -c "import sys,json; d=json.load(sys.stdin)['summary']; t=d.get('totalTests',1); p=d.get('passed',0); print(f'{p/t*100:.1f}')")
            echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| Pass Rate | $RATE% |" >> $GITHUB_STEP_SUMMARY
            if [ "$FAILED" -gt 0 ]; then
              echo "" >> $GITHUB_STEP_SUMMARY
              echo "### Failed Modules" >> $GITHUB_STEP_SUMMARY
              cat test-reports/diagnostic-summary.json | python3 -c "
              import sys, json
              d = json.load(sys.stdin)['summary']['byModule']
              for name, stats in d.items():
                if stats.get('failed', 0) > 0:
                  print(f'- **{name}**: {stats[\"failed\"]} failed')
              " >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "No diagnostic summary found." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_number }}
          path: test-reports/test-report.html
          retention-days: 90
          if-no-files-found: warn

      - name: Upload JSON diagnostic data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: diagnostic-json-${{ github.run_number }}
          path: |
            test-reports/vitest.json
            test-reports/diagnostic-summary.json
          retention-days: 90
          if-no-files-found: warn

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.run_number }}
          path: coverage/
          retention-days: 30
          if-no-files-found: warn

  # Optional: Create GitHub Issue when tests fail on scheduled runs
  create-issue-on-failure:
    name: Alert on Scheduled Failure
    needs: diagnostic
    if: failure() && github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `Test Diagnostic Failure — ${new Date().toISOString().split('T')[0]}`;
            const body = `## Automatic Test Diagnostic Failed\n\n` +
              `The daily scheduled test run failed.\n\n` +
              `[View Run](${runUrl})\n\n` +
              `### Next Steps\n` +
              `1. Download the test report artifact from the failed run\n` +
              `2. Check which modules failed in the diagnostic summary\n` +
              `3. Run \`bun run test:diagnostic\` locally to reproduce\n\n` +
              `---\n*This issue was automatically created by the Test Diagnostic workflow.*`;
            
            // Check if there's already an open issue for today
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'test-failure',
              per_page: 5
            });
            
            const existing = issues.data.find(i => i.title === title);
            if (!existing) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['test-failure', 'automated']
              });
            }
